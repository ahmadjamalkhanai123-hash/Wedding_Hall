replicaCount: 3

image:
  pullPolicy: Always

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 200m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

ingress:
  enabled: true
  hosts:
    - host: wedding-hall.yourdomain.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: wedding-hall-tls
      hosts:
        - wedding-hall.yourdomain.com
