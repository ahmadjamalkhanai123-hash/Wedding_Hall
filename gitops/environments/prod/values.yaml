replicaCount: 3

image:
  repository: jamalafridi99/wedding-hall
  tag: "latest"
  pullPolicy: Always

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 200m
    memory: 256Mi

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: wedding-hall.yourdomain.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: wedding-hall-prod-tls
      hosts:
        - wedding-hall.yourdomain.com

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
