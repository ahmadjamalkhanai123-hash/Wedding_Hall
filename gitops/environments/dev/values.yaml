replicaCount: 1

image:
  repository: jamalafridi99/wedding-hall
  tag: "c9bdc7dc7d6d7ec5889bc810220c094a05171067"
  pullPolicy: Always

resources:
  limits:
    cpu: 250m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 128Mi

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "selfsigned-issuer"
  hosts:
    - host: grandeurlounge.site
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: wedding-hall-tls
      hosts:
        - grandeurlounge.site

autoscaling:
  enabled: false
