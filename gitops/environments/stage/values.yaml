replicaCount: 2

image:
  repository: jamalafridi99/wedding-hall
  tag: "latest"
  pullPolicy: Always

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-staging"
  hosts:
    - host: wedding-hall.stage.local
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: wedding-hall-stage-tls
      hosts:
        - wedding-hall.stage.local

autoscaling:
  enabled: false
