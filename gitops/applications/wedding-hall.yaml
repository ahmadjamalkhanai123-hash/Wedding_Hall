apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wedding-hall
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/ahmadjamalkhanai123-hash/Wedding_Hall.git
    targetRevision: main
    path: helm
    helm:
      valueFiles:
        - ../gitops/environments/dev/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: wedding-hall
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
